<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Circle Background -->
  <circle cx="50" cy="50" r="48" fill="url(#globeGradient)"/>
  
  <!-- Globe Design -->
  <g transform="translate(50,50)">
    <!-- Outer Circle (Globe Border) -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
    
    <!-- Vertical Meridian Lines -->
    <ellipse cx="0" cy="0" rx="12" ry="35" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="24" ry="35" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    
    <!-- Horizontal Latitude Lines -->
    <line x1="-35" y1="0" x2="35" y2="0" stroke="#ffffff" stroke-width="2.5" opacity="0.7"/>
    <line x1="-30" y1="-17" x2="30" y2="-17" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="17" x2="30" y2="17" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    
    <!-- Center Dot -->
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
